services:

  items_db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: founditems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: moscowlostandfound
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - ./backend/app/.env
    depends_on:
      - items_db
    ports:
      - "8000:8000"

  tg-bot:
    build: ./tg-bot
    env_file:
      - ./tg-bot/bot/.env
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - items_db

volumes:
  postgres_data: